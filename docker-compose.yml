version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nyumba360-db
    environment:
      POSTGRES_DB: nyumba360
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - nyumba360-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nyumba360-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nyumba360-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nyumba360-api
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: nyumba360
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
      MPESA_SHORTCODE_CODE: ${MPESA_SHORTCODE_CODE}
      MPESA_PASSKEY: ${MPESA_PASSKEY}
      MPESA_INITIATOR_NAME: ${MPESA_INITIATOR_NAME}
      MPESA_INITIATOR_PASSWORD: ${MPESA_INITIATOR_PASSWORD}
      MPESA_SECURITY_CREDENTIAL: ${MPESA_SECURITY_CREDENTIAL}
      MPESA_INITIATOR_SHORTCODE: ${MPESA_INITIATOR_SHORTCODE}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./backups:/app/backups
    networks:
      - nyumba360-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: ./frontend/Dockerfile
    container_name: nyumba360-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_ENV: production
    ports:
      - "3000:3000"
    networks:
      - nyumba360-network
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nyumba360-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - nyumba-network
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: nyumba360-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - nyumba360-network
    depends_on:
      - backend
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: nyumba360-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: prometheus
      GF_SECURITY_ALLOW_EMBEDD: true
    ports:
      - "3001:3001"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - nyumba-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Filebeat for log aggregation
  filebeat:
    image: elastic/filebeat:8.8.0
    container_name: nyumba360-filebeat
    user: root
    volumes:
      - ./logs:/app/logs
      - ./monitoring/filebeat.yml:/usr/share/filebeat/filebeat.yml
      - /var/lib/docker/containers
      - /var/run/docker.sock
    networks:
      - nyumba-network
    depends_on:
      - backend
    restart: unless-stopped

  # Elasticsearch for log storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: nyumba360-elasticsearch
    environment:
      - discovery.type: single-node
      - xpack.security.enabled: false
      - "ES_JAVA_OPTS=-Xms1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - nyumba360-network
    restart: unless-stopped

  # Logstash for log processing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.8.0
    container_name: nyumba360-logstash
    environment:
      "LS_JAVA_OPTS=-Xms1g"
    volumes:
      - ./monitoring/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./logs:/app/logs
      - /var/lib/docker/containers
      - /var/run/docker.sock
    networks:
      - nyumba-network
    depends_on:
      - elasticsearch
      - filebeat
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local
  uploads:
    driver: local
  backups:
    driver: local
  logs:
    driver: local
  monitoring:
    driver: local
  ssl:
    driver: local

networks:
  nyumba360-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
        gateway: 172.20.0.1
