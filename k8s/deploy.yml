apiVersion: apps/v1
kind: Deployment

metadata:
  name: nyumba360-api
  labels:
    app: nyumba360-api
    version: "1.0.0"
    environment: production

spec:
  replicas: 2
  selector:
    matchLabels:
      app: nyumba360-api
  template:
    metadata:
      labels:
        app: nyumba360-api
    spec:
      containers:
      - name: nyumba360-api
        image: nyumba360/api:latest
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "nyumba360"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
         : "6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
        - name: MPESA_CONSUMER_KEY
          valueFrom:
            secretKeyRef:
              name: mpesa-consumer-key
        - name: MPESA_CONSUMER_SECRET
          valueFrom:
            secretKeyRef:
              name: mpesa-consumer-secret
        - name: MPESA_SHORTCODE_CODE
          valueFrom:
            secretKeyRef:
              name: mpesa-shortcode
        - name: MPESA_PASSKEY
          valueFrom:
            secretKeyRef:
              name: mpesa-passkey
        - name: MPESA_INITIATOR_NAME
          valueFrom:
            secretKeyRef:
              name: mpesa-initiator-name
        - name: MPESA_INITIATOR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mpesa-initiator-password
        - name: MPESA_SECURITY_CREDENTIAL
          valueFrom:
            secretKeyRef:
              name: mpesa-security-credential
        - name: MPESA_INITIATOR_SHORTCODE
          valueFrom:
            secretKeyRef:
              name: mpesa-initiator-shortcode
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
        liveness:
          probe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
              httpGet:
                path: /health
                port: 5000
                port: 5000
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 3
      imagePullSecrets:
        - name: jwt-secret
        - name: mpesa-consumer-key
        - name: mpesa-consumer-secret
        - name: mpesa-shortcode
        - name: mpesa-passkey
        - name: mpesa-initiator-name
        - name: mpesa-initiator-password
        - name: mpesa-security-credential
        - name: mpesa-initiator-shortcode

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyumba360-frontend
  labels:
    app: nyumba360-frontend
    version: "1.0.0"
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nyumba360-frontend
  template:
    metadata:
      labels:
        app: nyumba360-frontend
    spec:
      containers:
      - name: nyumba360-frontend
        image: nyumba360/frontend:latest
        ports:
          - containerPort: 3000
        env:
        - name: REACT_APP_API_URL
          value: "http://nyumba360-api-service:80"
        - name: REACT_APP_ENV
          value: "production"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
              memory: "512Mi"
      imagePullSecrets:
        - name: jwt-secret

---
apiVersion: v1
kind: Service
metadata:
  name: nyumba360-api-service
spec:
  selector:
    matchLabels:
      app: nyumba360-api
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: nyumba360-frontend
spec:
  selector:
    matchLabels:
      app: nyumba360-frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    server {
      listen 80;
      server_name _;
      
      # Security headers
      add_header X-Frame-Options "SAMEORIGIN";
      add_header X-Content-Type-Options nosniff;
      add_header X-XSS-Protection "1; mode=block";
      add_header Referrer-Policy "strict-origin-when-cross-origin";
      
      # CORS headers
      add_header Access-Control-Allow-Origin *;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
      add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization";
      
      # Main application route
      location / {
        try_files $uri $uri/ /index.html =404;
        proxy_pass http://nyumba360-api-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
      
      # API routes
      location /api/ {
        proxy_pass http://nyumba360-api-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }

---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
type: Opaque
data:
  value: "your-super-secret-jwt-secret-here"

---
apiVersion: v1
kind: Secret
metadata:
  name: mpesa-consumer-key
type: Opaque
data:
  value: "your-mpesa-consumer-key"

---
apiVersion: v1
kind: Secret
metadata:
  name: mpesa-consumer-secret
type: Opaque
data:
  value: "your-mpesa-consumer-secret"

---
apiVersion: v1
kind: Secret
metadata:
  name: mpesa-shortcode
type: Opaque
data:
  value: "174379"
---
apiVersion: v1
kind: Secret
metadata:
  name: mpesa-passkey
type: Opaque
data:
  value: "your-mpesa-passkey"

---
apiVersion: v1
kind: Secret
metadata:
  name: mpesa-initiator-name
type: Opaque
data:
  value: "sandbox"

---
apiVersion: v1
kind: Secret
metadata:
  name: mpesa-initiator-password
type: Opaque
data:
  value: "sandbox"

---
apiVersion: v1
kind: Secret
metadata:
  name: mpesa-security-credential
type: Opaque
data:
  value: "sandbox"

---
apiVersion: v1
kind: Secret
metadata:
  name: mpesa-initiator-shortcode
type: Opaque
data:
  value: "174379"

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  capacity: 5Gi
  storageClassName: "standard-rwo"
  hostPath: /var/lib/postgresql/data
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-data
spec:
  accessModes:
    - ReadWriteOnce
  capacity: 2Gi
  storageClassName: "standard-rwo"
  hostPath: /data/redis
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: uploads
spec:
  accessModes:
    - ReadWriteOnce
  capacity: 10Gi
  storageClassName: "standard-rwo"
  hostPath: /app/uploads
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: backups
spec:
  accessModes:
    - ReadWriteOnce
  capacity: 20Gi
  storageClassName: "standard-rwo"
  hostPath: /app/backups
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: logs
spec:
  accessModes:
    - ReadWriteOnce
  capacity: 5Gi
  storageClassName: "standard-rwo"
  hostPath: /app/logs
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  capacity: 10Gi
  storageClassName: "standard-rwo"
  hostPath: /app/monitoring
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ssl
spec:
  accessModes:
    - ReadWriteOnce
  capacity: 1Gi
  storageClassName: "standard-rwo"
  hostPath: /app/ssl
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: grafana-data
spec:
  accessModes:
    ReadWriteOnce
  capacity: 5Gi
  storageClassName: "standard-rwo"
  hostPath: /var/lib/grafana
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: elasticsearch-data
spec:
  accessModes:
    ReadWriteOnce
  capacity: 30Gi
  storageClassName: "standard-rwo"
  hostPath: /usr/share/elasticsearch/data
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-data
spec:
  accessModes:
    ReadWriteOnce
  capacity: 20Gi
  storageClassName: "standard-rwo"
  hostPath: /prometheus

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  spec:
  selector:
    matchLabels:
      app: nyumba360-api
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  spec:
  selector:
    matchLabels:
      app: nyumba360-api
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: nyumba360-api-service
  spec:
  selector:
    matchLabels:
      app: nyumba360-api
  ports:
    - port: 5000
      targetPort: 5000
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: nyumba360-frontend-service
  spec:
  selector:
    matchLabels:
      app: nyumba360-frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP

---
apiVersion: v1
kind: Ingress
metadata:
  name: nyumba360-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - nyumba360.co.ke
    - api.nyumba360.co.ke
  http:
  paths:
    - path: /
      pathType: Prefix
      backend:
        service: nyumba360-frontend-service
      servicePort: 3000
    - path: /api
      pathType: Prefix
      backend:
        service: nyumba360-api-service
        servicePort: 5000
  tls:
  - secretName: nyumba360-tls
    hosts:
    - nyumba360.co.ke
    - api.nyumba360.co.ke
    - api.nyumba360.co.ke

---
apiVersion: v1
kind: HorizontalPodAutoscaler
metadata:
  name: nyumba360-api-hpa
spec:
  scaleTargetRef:
    name: nyumba360-api
    maxReplicas: 5
  minReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
      target:
        type: Utilization
        averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
          target:
            type: Utilization
            averageUtilization: 80

---
apiVersion: v1
kind: HorizontalPodAutoscaler
metadata:
  name: nyumba360-frontend-hpa
spec:
  scaleTargetRef:
    name: nyumba360-frontend
    maxReplicas: 3
  minReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
          target:
            type: Utilization
            averageUtilization: 80

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: nyumba360-quota
spec:
  hard:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
    requests:
      ephemeralStorage: 2Gi
      storage: 100Gi
    persistentvolumes:
      - name: postgres-data
        storage: 10Gi
      - name: redis-data
        storage: 2Gi
      - name: uploads
        storage: 50Gi
      - name: backups
        storage: 20Gi
      - name: logs
        storage: 5Gi

---
apiVersion: v1
kind: NetworkPolicy
metadata:
  name: nyumba360-network
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    ingress:
      - from:
        - api.nyumba360.co.ke
      - nyumba360.co.ke
    - api.nyumba360.co.ke
    - nyumba360.co.ke
  policyType: Ingress
    ports:
    - port: 80
    - port: 443
    - port: 5000
    - port: 3000
    - port: 8081
  egress:
      - to: ["0.0.0.0/0"]
      - to: ["0.0.0.0/0"]

---
apiVersion: v1
kind: PodSecurityPolicy
metadata:
  name: nyumba360-psp
spec:
  privileged: false
  allowPrivilegeEscalation: false
  runAsUser: 1000
  seccompProfile: restricted
  fsGroup:
    rule: 'non-root'
    runAsUser: 1000
  volumes:
      - name: uploads
        path: /app/uploads
        readOnly: false
      - name: backups
        path: /app/backups
        readOnly: false
  readOnlyRootFilesystem: false
  allowedCapabilities:
    - 'CAP_DAC_READ_SEARCH'
    - 'CAP_DAC_READ_WRITE'
    - 'CAP_SYS_ADMIN'
    - 'CAP_SYS_ADMIN'
    - 'CAP_SYS_ADMIN'
    'CAP_SYS_PTRACE'
    'CAP_SYS_CHOWN'
    'CAP_SYS_ADMIN'
