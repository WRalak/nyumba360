name: Deploy to Docker Hub

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nyumba360-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nyumba360-backend:latest
      
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nyumba360-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nyumba360-frontend:latest
      
      - name: Summary
        run: |
          echo "Docker images pushed to Docker Hub!"
          echo "Backend: ${{ secrets.DOCKERHUB_USERNAME }}/nyumba360-backend:${{ github.sha }}"
          echo "Frontend: ${{ secrets.DOCKERHUB_USERNAME }}/nyumba360-frontend:${{ github.sha }}"
          echo "Latest tags: ${{ secrets.DOCKERHUB_USERNAME }}/nyumba360-backend:latest, ${{ secrets.DOCKERHUB_USERNAME }}/nyumba360-frontend:latest"
