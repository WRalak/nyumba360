name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci
      
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
      
      - name: Test Backend API
        run: |
          cd backend
          npm start &
          sleep 10
          curl -f http://localhost:5001/api/health || exit 1
          curl -f http://localhost:5002/api/health || exit 1
      
      - name: Test Frontend Build
        run: |
          cd frontend
          npm run preview &
          sleep 5
          curl -f http://localhost:4173 || exit 1

  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Security Scan
        run: |
          echo "Checking for exposed secrets..."
          # Check for common secret patterns
          if grep -r "password\|secret\|key" --include="*.js" --include="*.jsx" --include="*.json" --include="*.yml" --include="*.yaml" . | grep -v "node_modules\|\.git\|password.*placeholder\|secret.*placeholder\|key.*placeholder"; then
            echo "Potential secrets found!"
            exit 1
          else
            echo "No exposed secrets detected"
          fi
      
      - name: Check .gitignore
        run: |
          if [ ! -f .gitignore ]; then
            echo ".gitignore file is missing!"
            exit 1
          fi
          if ! grep -q "\.env" .gitignore; then
            echo ".env files not in .gitignore!"
            exit 1
          fi
          echo ".gitignore is properly configured"

  docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: nyumba360-backend:test
      
      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: nyumba360-frontend:test
      
      - name: Test Docker Images
        run: |
          docker run --rm -d -p 5001:5001 --name test-backend nyumba360-backend:test
          docker run --rm -d -p 3000:80 --name test-frontend nyumba360-frontend:test
          sleep 10
          curl -f http://localhost:5001/api/health || exit 1
          curl -f http://localhost:3000 || exit 1
          docker stop test-backend test-frontend
