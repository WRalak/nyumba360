name: Build Docker Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: nyumba360-backend:test
      
      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: nyumba360-frontend:test
      
      - name: Test Docker Images
        run: |
          docker run --rm -d -p 5001:5001 --name test-backend nyumba360-backend:test
          docker run --rm -d -p 3000:80 --name test-frontend nyumba360-frontend:test
          sleep 10
          curl -f http://localhost:5001/api/health || exit 1
          curl -f http://localhost:3000 || exit 1
          docker stop test-backend test-frontend
      
      - name: Summary
        run: |
          echo "Docker images built and tested successfully!"
          echo "Backend: nyumba360-backend:test"
          echo "Frontend: nyumba360-frontend:test"
          echo "To enable pushing to Docker Hub, set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets"
